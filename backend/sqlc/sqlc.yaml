version: "2"
sql:
  - engine: "postgresql"
    queries: "queries.sql"
    schema: "../migrations/"
    gen:
      go:
        package: "sqlcgen"
        out: "../internal/repository/postgres/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false
