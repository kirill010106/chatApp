services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        API_BASE_URL: ""
        WS_URL: ""
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
